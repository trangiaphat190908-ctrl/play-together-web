<html>
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-image: url("images/anh3.jpg");
            background-size: cover;
        }

        .box {
            background: rgba(255,255,255,0.9);
            padding: 30px;
            margin: 100px auto;
            width: 320px;
            border-radius: 10px;
        }

        input, button {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            background: orange;
            color: white;
            border: none;
        }

        a {
            color: blue;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Đăng ký</h1>

        <form>
            <input type="text" placeholder="Tên đăng nhập"><br>
            <input type="email" placeholder="Email"><br>
            <input type="password" placeholder="Mật khẩu"><br>
            <button type="submit">Tạo tài khoản</button>
        </form>

        <p>
            ← <a href="login.html">Quay lại đăng nhập</a>
        </p>
    </div>

</body>
</html>
