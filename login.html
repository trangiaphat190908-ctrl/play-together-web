<html>
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>
<style>
        body {
            margin: 0;
            font-family: Arial;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("images/anh1.jpg") no-repeat center;
            background-size: cover;
            filter: blur(8px);
            z-index: -1;
        }

     
        .box {
            background: rgba(255, 255, 255, 0.9);
            width: 320px;
            margin: 120px auto;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        input, button {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
        }

        a {
            color: blue;
            text-decoration: none;
        }
</style>
</head>
<body>

    <div class="box">
        <h1>Đăng nhập</h1>

        <form onsubmit="return login()">
            <input type="text" id="user" placeholder="Tên đăng nhập"><br>
            <input type="password" id="pass" placeholder="Mật khẩu"><br>
            <button type="submit">Đăng nhập</button>
        </form>

        <p>
            Bạn chưa có tài khoản? 
            <a href="index.html">Đăng ký nào</a>
        </p>
    </div>

    <script>
        function login() {
            var username = document.getElementById("user").value;
            var password = document.getElementById("pass").value;

            if(username === "playtogether" && password === "choihetminh") {
                alert("Đăng nhập thành công!");
                window.location.href = "home.html";
            } else {
                alert("Sai tài khoản!");
            }
            return false;
        }
    </script>
</body>
</html>
